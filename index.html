<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime checker</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 16px;
      }

      input, button {
        font-size: 16px;
        padding: 8px 10px;
        margin-top: 8px;
      }

      #result {
        margin-top: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Prime checker</h1>

    <label for="numberInput">Enter a number:</label><br />
    <input id="numberInput" type="number" placeholder="For example 17" />
    <button id="checkButton">Check</button>

    <div id="result"></div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
